[pytest]
testpaths = tests
addopts =
    -ra
    --strict-markers
    --strict-config
    -q
filterwarnings =
    ignore::DeprecationWarning:tensorflow.*
    ignore::DeprecationWarning:tensorboard.*
    ignore::UserWarning:matplotlib.*
    ignore::DeprecationWarning:pydantic.*
    ignore::FutureWarning:statsmodels.*
    ignore:invalid escape sequence:DeprecationWarning
markers =
    gpu: test requires a CUDA-capable GPU (skipped by default in CI)
    network: test requires network access (huggingface, etc.)
    heavy: test is slow or resource-heavy (>10s / >1GB memory)
    slow: end-to-end pipeline / training test (>30s wall-clock)
    gui: test drives a live Tk main loop (needs a display)
