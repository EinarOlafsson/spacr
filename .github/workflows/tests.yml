name: tests

on:
  push:
    branches: [main, spacr-claude, "**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  qt-suite:
    name: Qt suite (offscreen)
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install system libraries Qt needs (offscreen platform)
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libegl1 libxkbcommon0 libdbus-1-3 libpulse0 \
            libx11-xcb1 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xinerama0 libxcb-xkb1 libxkbcommon-x11-0 \
            libgl1 libglib2.0-0 libnss3 libxcomposite1 libxcursor1 \
            libxdamage1 libxi6 libxtst6 libasound2

      - name: Install spacr (Qt extras + dev)
        run: |
          python -m pip install --upgrade pip
          # Install the qt extras + pytest tooling. skip the pipeline
          # deps that need torch/cellpose to keep CI fast — the qt
          # suite doesn't need them.
          python -m pip install -e ".[qt,dev]" \
            --no-deps \
            || python -m pip install -e ".[qt,dev]"
          # Fall through to a full install if the --no-deps path fails
          # (e.g. an import at test-collection time)
          python -m pip install "pytest>=8" "pytest-qt>=4" \
            PySide6 qtawesome numpy scipy scikit-image scikit-learn \
            pillow imageio tifffile pandas psutil GPUtil keyring \
            matplotlib

      - name: Run the qt test suite
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest tests/qt/ -v --tb=short
