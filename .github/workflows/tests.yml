name: tests

on:
  push:
    branches: [main, spacr-nightly, "**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  qt-suite:
    name: Qt suite (offscreen)
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install system libraries Qt needs (offscreen platform)
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libegl1 libxkbcommon0 libdbus-1-3 libpulse0 \
            libx11-xcb1 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xinerama0 libxcb-xkb1 libxkbcommon-x11-0 \
            libgl1 libglib2.0-0 libnss3 libxcomposite1 libxcursor1 \
            libxdamage1 libxi6 libxtst6 libasound2

      - name: Install spacr (Qt extras + minimal pipeline deps)
        run: |
          python -m pip install --upgrade pip
          # Install spacr itself without deps first (deps come next in
          # controlled order so we can force CPU-only torch and skip
          # the CUDA wheels that would OOM the runner).
          python -m pip install -e ".[qt,dev]" --no-deps
          # CPU-only torch — much smaller than the CUDA wheel and all
          # spacr.utils actually needs at import time.
          python -m pip install --index-url https://download.pytorch.org/whl/cpu \
            "torch>=2.0" "torchvision"
          # Everything spacr.utils imports at module scope. Without
          # these, `from spacr.utils import load_settings` fails at
          # import in tests/qt/test_synthetic.py and the whole run
          # bails out on collection.
          python -m pip install \
            "pytest>=8" "pytest-qt>=4" PySide6 qtawesome \
            numpy scipy scikit-image scikit-learn \
            pillow imageio tifffile pandas psutil GPUtil keyring \
            matplotlib statsmodels requests \
            opencv-python-headless cellpose

      - name: Run the qt test suite
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest tests/qt/ -v --tb=short

  full-suite:
    name: Full non-Qt suite
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    # Only run on main and on the working branch. Heavy job — we don't
    # want it running on every feature branch push.
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/spacr-nightly' || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install system libraries needed by scientific stack
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libgl1 libglib2.0-0 libsm6 libxext6 libxrender1 \
            ffmpeg

      - name: Install spacr (full deps except optional heavy extras)
        run: |
          python -m pip install --upgrade pip
          # Full install — this pulls torch, cellpose, everything.
          # We install CPU-only torch first so pip doesn't fetch a GPU
          # build.
          python -m pip install --index-url https://download.pytorch.org/whl/cpu \
            "torch>=2.0" "torchvision" || true
          python -m pip install -e ".[dev]"

      - name: Run non-Qt suite (excluding gpu + slow)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Everything outside tests/qt/ except:
          #   - tests marked `heavy` or `slow` (long-running E2E)
          #   - test_gpu_pipeline.py (needs CUDA)
          python -m pytest tests/ \
            --ignore=tests/qt \
            --ignore=tests/test_gpu_pipeline.py \
            -m "not slow and not heavy" \
            -v --tb=short
