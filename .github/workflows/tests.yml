name: tests

on:
  push:
    branches: [main, nightly, spacr-nightly, "**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# One consolidated job — installs the exact same way as local dev
# (`pip install -e ".[qt,dev]"` on top of a CPU-only torch) and runs
# every test in tests/ except:
#   - tests/qt/test_e2e_pipeline.py's `slow` marks (need cellpose models)
#   - tests/test_gpu_pipeline.py (needs CUDA)
#   - anything marked `heavy` (long-running)
# This mirrors what a maintainer runs on their workstation, so a green
# CI badge and a green local run mean the same thing.

jobs:
  tests:
    name: Full test suite
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install system libraries (Qt offscreen + scientific stack)
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libegl1 libxkbcommon0 libdbus-1-3 libpulse0 \
            libx11-xcb1 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xinerama0 libxcb-xkb1 libxkbcommon-x11-0 \
            libgl1 libglib2.0-0 libnss3 libxcomposite1 libxcursor1 \
            libxdamage1 libxi6 libxtst6 libasound2 \
            libsm6 libxext6 libxrender1 ffmpeg

      - name: Install spacr (full deps, CPU-only torch)
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch first so pip doesn't fetch the CUDA wheel
          # that would OOM the runner.
          python -m pip install --index-url https://download.pytorch.org/whl/cpu \
            "torch>=2.0" "torchvision"
          # Full install pulls every dep from setup.py's install_requires:
          # IPython, mahotas, czifile, readlif, statsmodels, cellpose,
          # transformers, monai, xgboost, umap, seaborn, biopython, etc.
          python -m pip install -e ".[qt,dev]"

      - name: Run tests (skip slow / heavy / gpu-only)
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_gpu_pipeline.py \
            -m "not slow and not heavy" \
            -v --tb=short
