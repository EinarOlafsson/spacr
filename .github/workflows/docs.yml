name: docs

on:
  push:
    branches: [main, nightly]
  workflow_dispatch:

# Deploys the sphinx-autoapi build directly through the GitHub Pages
# artifact upload API (modern approach — bypasses gh-pages, bypasses
# `main:/docs/` commit, bypasses branch protection).
#
# REQUIRES: Repository Settings → Pages → "Build and deployment" →
#           Source = "GitHub Actions" (not "Deploy from a branch").
# If it's still "Deploy from a branch", this workflow silently uploads
# but Pages keeps serving the old branch — flip the source once.

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Sphinx
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install spacr + Sphinx tooling
        run: |
          python -m pip install --upgrade pip
          # spacr installed --no-deps so autoapi can walk the source
          # tree via its AST parser (no runtime imports needed).
          python -m pip install -e "." --no-deps
          python -m pip install sphinx sphinx_rtd_theme sphinx-autoapi

      - name: Build docs
        run: |
          rm -rf docs/_build docs/source/api
          sphinx-build -E -b html docs/source docs/_build/html
          # Sphinx build root needs a .nojekyll so Pages doesn't strip
          # underscore-prefixed asset folders.
          touch docs/_build/html/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
