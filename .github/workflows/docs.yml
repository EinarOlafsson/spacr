name: docs

on:
  push:
    branches: [main, nightly]
  workflow_dispatch:

# Deploys the sphinx-autoapi build directly through the GitHub Pages
# artifact upload API (modern approach — bypasses gh-pages, bypasses
# `main:/docs/` commit, bypasses branch protection).
#
# REQUIRES: Repository Settings → Pages → "Build and deployment" →
#           Source = "GitHub Actions" (not "Deploy from a branch").
# If it's still "Deploy from a branch", this workflow silently uploads
# but Pages keeps serving the old branch — flip the source once.

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Sphinx
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install spacr + Sphinx tooling
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch first (matches tests.yml) so pip won't fetch
          # the CUDA wheel while resolving spacr's install_requires.
          python -m pip install --index-url https://download.pytorch.org/whl/cpu \
            "torch>=2.0" "torchvision"
          # Full install — autoapi's AST walker doesn't NEED to import
          # spacr modules, but sphinx-build's viewcode + import-checks
          # do, and half the docstring cross-refs break without the
          # full dep graph. Same install path as tests.yml so any
          # green-tests commit produces a green docs build too.
          python -m pip install -e ".[qt,dev]"
          python -m pip install sphinx sphinx_rtd_theme sphinx-autoapi

      - name: Build docs
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          rm -rf docs/_build docs/source/api
          # --keep-going: continue past docutils errors in individual
          # docstrings (an unindented code block in one docstring should
          # not sink the whole site). Capture the build log for the
          # summary + check `index.html` was produced; if it was, we
          # ship it regardless of docutils warnings.
          set +e
          sphinx-build -E -b html --keep-going \
            docs/source docs/_build/html 2>&1 | tee /tmp/sphinx.log
          rc=${PIPESTATUS[0]}
          set -e
          echo "sphinx-build exit=$rc"
          if [ ! -f docs/_build/html/index.html ]; then
            echo "FATAL: no index.html produced"
            tail -80 /tmp/sphinx.log
            exit 1
          fi
          echo "produced $(find docs/_build/html -name '*.html' | wc -l) HTML pages"
          # Pages needs .nojekyll to preserve _static / _sources folders
          touch docs/_build/html/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
