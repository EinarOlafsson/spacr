name: docs

on:
  push:
    branches: [main, nightly]
  workflow_dispatch:

# Publish the built HTML to the existing gh-pages branch — that is
# where https://einarolafsson.github.io/spacr/ has been served from
# historically (last touched 2025-04-11 before this workflow existed).

jobs:
  build-and-deploy:
    name: Build Sphinx + publish gh-pages
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: write   # required so peaceiris can push to gh-pages

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install spacr + Sphinx tooling
        run: |
          python -m pip install --upgrade pip
          # spacr itself so autoapi can find version metadata + logo.
          # --no-deps because we don't need the heavy pipeline stack
          # for a docs build — autoapi walks the AST, doesn't import.
          python -m pip install -e "." --no-deps
          python -m pip install sphinx sphinx_rtd_theme sphinx-autoapi

      - name: Build docs
        run: |
          rm -rf docs/_build docs/source/api
          sphinx-build -E -b html docs/source docs/_build/html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: docs/_build/html
          commit_message: "deploy docs from ${{ github.sha }}"
